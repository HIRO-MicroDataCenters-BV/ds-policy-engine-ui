<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Policy Engine — User Guide</title>
  <link rel="stylesheet" href="./css/styles.css" />
  <!-- Theme sync — pick up the dashboard's choice (localStorage.ds-theme,
       written by app.js setTheme()) and apply the same data-theme attribute
       the main CSS keys off. Inline in <head> so there's no flash. -->
  <script>
    (function () {
      function resolve() {
        var saved = localStorage.getItem('ds-theme') || 'system';
        if (saved === 'system') {
          return window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
        }
        return saved;
      }
      function apply() {
        document.documentElement.setAttribute('data-theme', resolve());
      }
      apply();
      // Follow the OS when "system" is chosen.
      window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change', apply);
      // Follow the dashboard's live changes when opened in a sibling tab.
      window.addEventListener('storage', function (e) { if (e.key === 'ds-theme') apply(); });
    })();
  </script>
  <style>
    /* Self-contained styling — this page isn't rendered through the app shell,
       so we define a minimal readable layout on top of the shared CSS vars.
       The dashboard's styles.css sets `body { height:100vh; overflow:hidden }`
       (needed for its fixed-sidebar layout). Override here so the guide
       actually scrolls. !important is required because the dashboard CSS
       loads before this block. */
    html, body {
      background: var(--bg, #fff);
      color: var(--text, #111);
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      line-height: 1.6;
      height: auto !important;
      overflow: auto !important;
    }
    .guide-shell {
      max-width: 880px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }
    .guide-shell a { color: var(--accent, #2563eb); }
    .guide-shell a:hover { text-decoration: underline; }
    .guide-shell h1, .guide-shell h2, .guide-shell h3, .guide-shell h4 {
      line-height: 1.25;
      margin-top: 2em;
    }
    .guide-shell h1 { font-size: 2em; border-bottom: 1px solid var(--border, #e5e7eb); padding-bottom: 0.3em; }
    .guide-shell h2 { font-size: 1.5em; border-bottom: 1px solid var(--border, #e5e7eb); padding-bottom: 0.3em; }
    .guide-shell h3 { font-size: 1.25em; }
    .guide-shell p, .guide-shell li { font-size: 15px; }
    .guide-shell pre {
      background: var(--surface2, #f0f2f5);
      color: var(--text, #111);
      border: 1px solid var(--border, #e5e7eb);
      border-radius: 6px;
      padding: 12px 14px;
      overflow-x: auto;
      font-size: 13px;
    }
    .guide-shell code {
      background: var(--surface2, #f0f2f5);
      color: var(--text, #111);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 0.9em;
    }
    .guide-shell pre code { background: transparent; padding: 0; color: inherit; }
    .guide-shell table {
      border-collapse: collapse;
      width: 100%;
      margin: 1em 0;
      font-size: 14px;
    }
    .guide-shell th, .guide-shell td {
      border: 1px solid var(--border, #e5e7eb);
      padding: 6px 10px;
      text-align: left;
      vertical-align: top;
    }
    .guide-shell th { background: var(--surface2, #f0f2f5); color: var(--text, #111); font-weight: 600; }
    .guide-shell blockquote {
      border-left: 4px solid var(--border, #e5e7eb);
      padding: 0 1em;
      color: var(--text-secondary, #6b7280);
      margin: 1em 0;
    }
    .guide-topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      background: var(--bg, #fff);
      border-bottom: 1px solid var(--border, #e5e7eb);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .guide-topbar a.back { text-decoration: none; color: var(--text-secondary, #6b7280); font-size: 13px; }
    .guide-topbar a.back:hover { color: var(--text, #111); }
    .guide-topbar .title { font-weight: 600; font-size: 15px; }
    .loading, .error {
      padding: 40px 0;
      color: var(--text-secondary, #6b7280);
      text-align: center;
      font-size: 14px;
    }
    .error { color: #dc2626; }
  </style>
</head>
<body>
  <div class="guide-topbar">
    <a class="back" href="./index.html">← Back to dashboard</a>
    <span class="title">Policy Engine — User Guide</span>
  </div>

  <div class="guide-shell">
    <div id="content" class="loading">Loading user guide…</div>
  </div>

  <!-- Markdown renderer. Version pinned to a known-good release; CDN is jsdelivr. -->
  <script src="https://cdn.jsdelivr.net/npm/marked@14.1.3/marked.min.js"></script>
  <script>
    (async function () {
      const el = document.getElementById('content');
      try {
        const resp = await fetch('./USER_GUIDE.md', { cache: 'no-cache' });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const md = await resp.text();
        // Rewrite GitHub-relative links that won't resolve here.
        const cleaned = md
          .replace(/\]\(\.\.\/README\.md\)/g, '](https://github.com/HIRO-MicroDataCenters-BV/ds-policy-engine-ui/blob/main/README.md)')
          .replace(/\]\(\.\.\/CLAUDE\.md\)/g, '](https://github.com/HIRO-MicroDataCenters-BV/ds-policy-engine-ui/blob/main/CLAUDE.md)');
        el.classList.remove('loading');
        el.innerHTML = marked.parse(cleaned);

        // marked@14 does NOT auto-assign ids on headings, so the TOC's
        // `#what-the-policy-engine-is`-style links have no targets.
        // Assign slugified ids to every heading so the Contents section works.
        function slugify(text) {
          return text
            .toLowerCase()
            .trim()
            .replace(/[^a-z0-9\s-]/g, '')   // strip punctuation
            .replace(/\s+/g, '-')            // spaces -> dashes
            .replace(/-+/g, '-');            // collapse runs
        }
        const used = new Set();
        el.querySelectorAll('h1, h2, h3, h4, h5, h6').forEach((h) => {
          let base = slugify(h.textContent || '');
          if (!base) return;
          let id = base, n = 1;
          while (used.has(id)) { id = `${base}-${n++}`; }
          used.add(id);
          h.id = id;
        });

        // If the page was loaded with a hash, jump to it now that targets exist.
        if (location.hash) {
          const target = document.getElementById(location.hash.slice(1));
          if (target) target.scrollIntoView();
        }
      } catch (e) {
        el.classList.remove('loading');
        el.classList.add('error');
        el.textContent = 'Failed to load USER_GUIDE.md: ' + e.message;
      }
    })();
  </script>
</body>
</html>
