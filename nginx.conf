worker_processes auto;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_min_length 256;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;

  access_log /dev/stdout;
  error_log  /dev/stderr warn;

  server {
    listen 8080 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA-style fallback — every unknown path serves index.html.
    # The policy-engine UI uses hash/state routing inside one index.html.
    location / {
      try_files $uri $uri/ /index.html;
    }

    # Simple health endpoint for probes.
    location = /healthz {
      access_log off;
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    # config.js is generated at container start — never cache it.
    location = /config.js {
      add_header Cache-Control "no-store, no-cache, must-revalidate";
      expires 0;
    }

    # Static assets: cache for a year (content-hashed via version bumps).
    location ~* \.(css|js|svg|png|jpg|jpeg|gif|ico|woff|woff2|ttf)$ {
      expires 1y;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }
  }
}
