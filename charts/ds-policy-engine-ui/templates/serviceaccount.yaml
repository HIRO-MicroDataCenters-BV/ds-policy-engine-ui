{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ds-policy-engine-ui.serviceAccountName" . }}
  namespace: {{ include "ds-policy-engine-ui.namespace" . }}
  labels:
    {{- include "ds-policy-engine-ui.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
