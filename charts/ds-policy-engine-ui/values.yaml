replicaCount: 1

image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: "ds-policy-engine-ui"

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}

container:
  port: 8080

service:
  type: ClusterIP
  port: 80

livenessProbe:
  httpGet:
    path: /healthz
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 20
readinessProbe:
  httpGet:
    path: /healthz
    port: 8080
  initialDelaySeconds: 3
  periodSeconds: 10

ingress:
  enabled: true
  className: ""
  annotations: {}
  host: ds-policy-engine-ui.nextgen.hiro-develop.nl
  path: /
  pathType: Prefix

# Backend URL the UI calls — injected into config.js at container start.
config:
  apiBaseUrl: http://ds-policy-engine.nextgen.hiro-develop.nl

resources:
  requests:
    memory: "32Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "200m"

namespace: ""
nodeSelector: {}
tolerations: []
affinity: {}

extraEnv: []
