replicaCount: 1

image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: "ds-policy-engine-ui"

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}

container:
  port: 8080

service:
  type: ClusterIP
  port: 80

livenessProbe:
  httpGet:
    path: /healthz
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 20
readinessProbe:
  httpGet:
    path: /healthz
    port: 8080
  initialDelaySeconds: 3
  periodSeconds: 10

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: ds-policy-engine-ui.nextgen.hiro-develop.nl
  path: /
  pathType: Prefix

# Backend that nginx reverse-proxies /api, /health, /docs, etc. to.
# In-cluster short name works when backend is in the same namespace.
backend:
  url: http://ds-policy-engine:8000

# Optional: set to a full origin string to make the UI call a different host
# directly instead of using the same-origin nginx proxy. Leave empty for
# the standard Option B flow.
config:
  apiBaseUrl: ""

resources:
  requests:
    memory: "32Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "200m"

namespace: ""
nodeSelector: {}
tolerations: []
affinity: {}

extraEnv: []
