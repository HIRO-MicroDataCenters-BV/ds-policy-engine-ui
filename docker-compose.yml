services:
  ds-policy-engine-ui:
    build: .
    container_name: ds-policy-engine-ui
    hostname: ds-policy-engine-ui
    restart: unless-stopped
    ports:
      - "127.0.0.1:${UI_PORT:-8080}:8080"
    environment:
      # Point the UI at your local backend (ds-policy-engine docker-compose on :8000).
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8000}
